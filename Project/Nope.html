<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nope - Smart Budget Planner</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #e3f2fd, #ffffff);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      padding: 40px;
      width: 350px;
      max-width: 90%;
      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      color: #0d47a1;
      margin-bottom: 10px;
    }

    p {
      color: #333;
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 25px;
    }

    button {
      background: #0d47a1;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #1565c0;
    }

    .emoji {
      font-size: 48px;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">😅</div>
    <h1>All Good!</h1>
    <p>No problem — saving money isn’t on your radar right now.  
    You can come back anytime when you're ready to plan smarter!</p>
    <button id="homeBtn">🏠 Go Back Home</button>
  </div>

  <script>
    document.getElementById('homeBtn').addEventListener('click', () => {
      window.location.href = 'home.html';
    });
  </script>
</body>
</html>
