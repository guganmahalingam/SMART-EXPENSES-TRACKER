<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Forgot Password - Smart Expense Tracker</title>
  <style>
    body{font-family:Arial, sans-serif;background:#f4f4f4;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
    .card{background:#fff;padding:24px;border-radius:10px;box-shadow:0 6px 18px rgba(0,0,0,.08);width:360px}
    input,button{width:100%;padding:10px;margin:10px 0;border-radius:6px;border:1px solid #ccc;box-sizing:border-box}
    button{background:#1976d2;color:#fff;border:none}
    a{display:block;margin-top:8px;text-align:center;color:#1976d2;text-decoration:none}
  </style>
</head>
<body>
  <div class="card">
    <h2>Forgot Password</h2>
    <input id="email" type="email" placeholder="Enter your registered email" />
    <button id="sendOtpBtn">Send OTP (Simulated)</button>

    <div id="otpSection" style="display:none;">
      <input id="otpInput" type="text" placeholder="Enter OTP"/>
      <input id="newPassword" type="password" placeholder="Enter new password"/>
      <button id="resetBtn">Reset Password</button>
    </div>

    <a href="login.html">Back to Login</a>
  </div>

  <script>
    let generatedOtp = null;
    let targetEmail = null;

    function openDB(){
      return new Promise((res, rej) => {
        const r = indexedDB.open('UserDB', 1);
        r.onupgradeneeded = () => {
          const db = r.result;
          if (!db.objectStoreNames.contains('users')) db.createObjectStore('users', { keyPath:'email' });
          if (!db.objectStoreNames.contains('budgets')) db.createObjectStore('budgets', { keyPath: ['email','name'] });
        };
        r.onsuccess = () => res(r.result);
        r.onerror = () => rej(r.error);
      });
    }

    document.getElementById('sendOtpBtn').addEventListener('click', async ()=>{
      const email = document.getElementById('email').value.trim();
      if (!email) return alert('Enter email');
      const db = await openDB();
      const tx = db.transaction('users','readonly');
      const store = tx.objectStore('users');
      const req = store.get(email);
      req.onsuccess = () => {
        if (!req.result) return alert('No account found with this email.');
        generatedOtp = Math.floor(100000 + Math.random()*900000).toString();
        targetEmail = email;
        alert('SIMULATED OTP (for testing): ' + generatedOtp + '\nIn production replace with email send.');
        document.getElementById('otpSection').style.display = 'block';
      };
      req.onerror = () => alert('DB error');
    });

    document.getElementById('resetBtn').addEventListener('click', async ()=>{
      const entered = document.getElementById('otpInput').value.trim();
      const newPass = document.getElementById('newPassword').value;
      if (!entered || !newPass) return alert('Enter OTP and new password');
      if (entered !== generatedOtp) return alert('Invalid OTP');

      const db = await openDB();
      const tx = db.transaction('users','readwrite');
      const store = tx.objectStore('users');
      const req = store.get(targetEmail);
      req.onsuccess = () => {
        const user = req.result;
        user.password = newPass;
        const upd = store.put(user);
        upd.onsuccess = () => {
          alert('Password updated. Please login.');
          window.location.href = 'login.html';
        };
        upd.onerror = () => alert('Update failed.');
      };
      req.onerror = () => alert('DB error');
    });
  </script>
</body>
</html>
