<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Authentication</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
    :root {
        --primary-blue: #007bff;
        --light-blue: #000000; /* Stays black for the space background */
        --danger-red: #dc3545;
        --success-green: #28a745;
        --google-red: #ea4335;
        --gray-light: #f8f9fa;
    }

    /* --- BACKGROUND CANVAS STYLES --- */
    #starCanvas {
        position: fixed; /* Fixes the canvas to the viewport */
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1; /* Puts the canvas behind the content */
    }

    body {
        background-color: var(--light-blue);
        font-family: 'Inter', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        position: relative;
    }

    /* ---------- MINIMIZED LOGIN BOX ---------- */
    .auth-container {
        width: 100%;
        max-width: 360px; /* Reduced size */
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.45);
        border-radius: 1rem;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.92);
        z-index: 1;
    }

    /* Tab Navigation Header Area */
    .auth-header {
        background-color: var(--gray-light);
        padding: 0 1.2rem;
        padding-top: 1rem;
    }

    /* Full Width and Centered Tabs */
    .nav-tabs {
        border-bottom: none;
        display: flex;
        margin-bottom: 0;
        border-bottom: 1px solid #dee2e6;
    }

    .nav-item {
        flex-grow: 1;
        text-align: center;
    }

    .nav-link {
        width: 100%;
        color: #495057;
        font-weight: 700;
        border: none;
        border-bottom: 3px solid transparent;
        border-radius: 0;
        padding: 0.7rem 0.6rem; /* Reduced */
        font-size: 0.9rem; /* Smaller text */
        transition: 0.2s;
        margin-bottom: -1px;
    }

    .nav-link.active {
        color: var(--primary-blue);
        background-color: white;
        border-color: var(--primary-blue);
        border-bottom: 3px solid var(--primary-blue);
        border-top-left-radius: 0.8rem;
        border-top-right-radius: 0.8rem;
    }

    .nav-link:hover:not(.active) {
        color: #212529;
    }

    /* Content Area - Minimized */
    .auth-content {
        padding: 1.5rem 1.2rem; /* Reduced padding */
    }

    /* Form Titles */
    .auth-content h3 {
        color: #343a40 !important;
        margin-bottom: 1.2rem;
        font-size: 1.4rem; /* Slightly smaller */
        font-weight: 700;
        text-align: center;
    }

    /* Smaller Inputs */
    .form-control {
        border-radius: 0.6rem;
        padding: 0.55rem 0.9rem;
        font-size: 0.9rem;
    }

    .btn-primary {
    
        background-color: var(--primary-blue);
        border-color: var(--primary-blue);
        border-radius: 0.5rem;
        padding: 0.6rem 1rem;
        font-weight: 600;
        font-size: 0.9rem;
    }

    .google-btn {
        border-color: var(--google-red);
        color: var(--google-red);
        font-weight: 600;
        border-radius: 0.5rem;
        transition: background-color 0.2s, color 0.2s;
        padding: 0.6rem 1rem;
        font-size: 0.9rem;
    }

    .google-btn:hover {
        background-color: var(--google-red);
        color: white;
    }

    #strength-bar-container {
        height: 6px;
        background-color: #e0e0e0;
        border-radius: 3px;
        margin-top: 5px;
        overflow: hidden;
    }

    #strength-bar {
        height: 100%;
        width: 0%;
        transition: width 0.3s, background-color 0.3s;
    }

    .text-link {
        cursor: pointer;
        color: var(--primary-blue);
        text-decoration: none;
        font-weight: 600;
        font-size: 0.9rem;
    }
</style>

</head>
<body>

    <canvas id="starCanvas"></canvas>

    <div class="auth-container">
        <div class="auth-header">
            <ul class="nav nav-tabs" id="authTab" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login-content" type="button" role="tab" aria-controls="login-content" aria-selected="true">LOGIN</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register-content" type="button" role="tab" aria-controls="register-content" aria-selected="false">SIGN UP</button>
                </li>
            </ul>
        </div>

        <div class="tab-content auth-content" id="authTabContent">

            <div class="tab-pane fade show active" id="login-content" role="tabpanel" aria-labelledby="login-tab">
                <h3 class="text-center">Access Your Account</h3>
                <form id="loginForm">
                    <div class="mb-3">
                        <label for="loginEmail" class="form-label">Email address</label>
                        <input type="email" class="form-control" id="loginEmail" placeholder="name@example.com" required>
                    </div>

                    <div class="mb-3">
                        <label for="loginPassword" class="form-label">Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="loginPassword" placeholder="Enter your password" required>
                            <span class="input-group-text toggle-password bg-white" data-target="loginPassword" style="cursor: pointer;">
                                <i class="fas fa-eye" id="toggleLoginPassword"></i>
                            </span>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-5">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="" id="rememberMe">
                            <label class="form-check-label" for="rememberMe">
                                Remember me
                            </label>
                        </div>
                        <a href="#" class="text-link" data-bs-toggle="modal" data-bs-target="#resetPasswordModal" style="font-weight: normal; font-size: 0.9rem;">Forgot Password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mb-4">LOG IN</button>
                </form>

                <div class="divider text-center my-3">
                    <span class="text-muted small">OR</span>
                </div>

                <button type="button" class="btn btn-outline-danger w-100 google-btn dummy-social-login">
                    <i class="fab fa-google me-2"></i> Continue with Google
                </button>
            </div>

            <div class="tab-pane fade" id="register-content" role="tabpanel" aria-labelledby="register-tab">
                <h3 class="text-center">Start Your Free Account</h3>
                <form id="registerForm">
                    <div class="mb-3">
                        <label for="registerEmail" class="form-label">Email address</label>
                        <input type="email" class="form-control" id="registerEmail" placeholder="name@example.com" required>
                    </div>

                    <div class="mb-3">
                        <label for="registerPassword" class="form-label">Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="registerPassword" placeholder="Choose a strong password" required>
                            <span class="input-group-text toggle-password bg-white" data-target="registerPassword" style="cursor: pointer;">
                                <i class="fas fa-eye" id="toggleRegisterPassword"></i>
                            </span>
                        </div>
                        <div id="strength-bar-container">
                            <div id="strength-bar"></div>
                        </div>
                        <small id="password-help" class="form-text text-muted">Must be at least 6 characters.</small>
                    </div>

                    <div class="mb-4">
                        <label for="registerConfirmPassword" class="form-label">Confirm Password</label>
                        <input type="password" class="form-control" id="registerConfirmPassword" placeholder="Confirm your password" required>
                        <small id="match-status" class="form-text"></small>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mb-4">SIGN UP</button>
                </form>
                
                <div class="divider text-center my-3">
                    <span class="text-muted small">OR</span>
                </div>

                <button type="button" class="btn btn-outline-danger w-100 google-btn dummy-social-login">
                    <i class="fab fa-google me-2"></i> Sign Up with Google
                </button>
            </div>
        </div>
    </div>

    <div class="modal fade" id="notificationModal" tabindex="-1" aria-labelledby="notificationModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header" style="background-color: var(--primary-blue); color: white;">
                    <h5 class="modal-title" id="notificationModalLabel">Notification</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="notificationModalBody">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">OK</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="resetPasswordModal" tabindex="-1" aria-labelledby="resetPasswordModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header" style="background-color: var(--primary-blue); color: white;">
                    <h5 class="modal-title" id="resetPasswordModalLabel">Reset Password</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="resetPasswordForm">
                    <div class="modal-body">
                        <p>Enter your email address below to receive a password reset link.</p>
                        <input type="email" class="form-control" id="resetEmail" placeholder="Enter your email" required>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Send Reset Link</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { 
            getAuth, 
            createUserWithEmailAndPassword, 
            signInWithEmailAndPassword, 
            sendPasswordResetEmail 
        } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";


        // =======================================================
        // 1. STAR CANVAS ANIMATION LOGIC (NEW)
        // =======================================================
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let width = window.innerWidth;
        let height = window.innerHeight;

        // Arrays to hold stars and shooting stars
        const stars = [];
        const shootingStars = [];
        const numStars = 100;

        // Resize function
        function setCanvasDimensions() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        // Initialize stars
        function initStars() {
            for (let i = 0; i < numStars; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    radius: Math.random() * 1.5 + 0.5,
                    alpha: Math.random()
                });
            }
        }

        // Draw static stars
        function drawStars() {
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, width, height); // Clear the canvas with black

            stars.forEach(s => {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                
                // Twinkling effect: subtly change alpha
                s.alpha += (Math.random() - 0.5) * 0.05;
                if (s.alpha > 1) s.alpha = 1;
                if (s.alpha < 0.1) s.alpha = 0.1;

                ctx.fillStyle = `rgba(255, 255, 255, ${s.alpha})`;
                ctx.fill();
            });
        }

        // Create a new shooting star object
        function createShootingStar() {
            // Start from a random position in the top-left quadrant (for diagonal movement)
            const x = Math.random() * width * 0.7; 
            const y = Math.random() * height * 0.7;

            shootingStars.push({
                x: x,
                y: y,
                speed: Math.random() * 8 + 4, // 4 to 12
                size: Math.random() * 1 + 1, // 1 to 2
                length: Math.random() * 80 + 50, // 50 to 130
                life: 0,
                maxLife: 150 // Duration before it vanishes
            });
        }

        // Draw and update shooting stars (using your provided logic)
        function drawShootingStars() {
            for (let i = shootingStars.length - 1; i >= 0; i--) {
                const s = shootingStars[i];
                
                // Create a smooth, bright tail effect
                const gradient = ctx.createLinearGradient(s.x, s.y, s.x - s.length, s.y + s.length / 2);
                gradient.addColorStop(0, 'rgba(255, 255, 255, 1)'); // Bright white head
                gradient.addColorStop(0.5, 'rgba(56,189,248,0.8)'); // Blue-ish tail center
                gradient.addColorStop(1, 'rgba(56,189,248,0)'); // Fading tail end

                ctx.strokeStyle = gradient;
                ctx.lineWidth = s.size;
                ctx.beginPath();
                ctx.moveTo(s.x, s.y);
                ctx.lineTo(s.x - s.length, s.y + s.length / 2);
                ctx.stroke();

                // Movement
                s.x += s.speed;
                s.y += s.speed / 2; // Adjusted for a slightly gentler downward angle
                s.life++;

                // Remove star if it goes off-screen or exceeds life
                if (s.life > s.maxLife || s.x > width + s.length || s.y > height + s.length) {
                    shootingStars.splice(i, 1);
                }
            }
        }

        function animate() {
            drawStars(); // Draws static stars and clears canvas
            drawShootingStars(); 
            if (Math.random() < 0.01) createShootingStar(); // Controls frequency
            requestAnimationFrame(animate);
        }
        
        // Initial setup calls
        setCanvasDimensions();
        initStars();
        animate();
        
        window.addEventListener('resize', setCanvasDimensions);


        // =======================================================
        // 2. NOTIFICATION UTILITIES (Unchanged)
        // =======================================================

        const notificationModalElement = document.getElementById('notificationModal');
        const notificationTitle = document.getElementById('notificationModalLabel');
        const notificationBody = document.getElementById('notificationModalBody');
        let notificationModal;

        if (notificationModalElement) {
            notificationModal = new bootstrap.Modal(notificationModalElement);
        }
        
        function showNotification(title, message) {
            if (!notificationTitle || !notificationBody || !notificationModal) {
                console.error(`Attempted to show notification: ${title} - ${message}`);
                return;
            }

            notificationTitle.textContent = title;
            notificationBody.innerHTML = message;
            notificationModal.show();
        }

        function redirectToHome() {
            console.log("Redirecting to home page..."); 
            // window.location.href = '/dashboard.html'; 
            window.location.href = 'home.html'; 
        }
        
        // =======================================================
        // 3. FIREBASE CONFIG & INITIALIZATION (Unchanged)
        // =======================================================
        
        const firebaseConfig = {
            apiKey: "AIzaSyCnJRJXuSKS-km_nQRhxhjEjaTM_EY9mFc",
            authDomain: "smart-expense-tracker-d8264.firebaseapp.com",
            projectId: "smart-expense-tracker-d8264",
            storageBucket: "smart-expense-tracker-d8264.firebasestorage.app",
            messagingSenderId: "328090419079",
            appId: "1:328090419079:web:28d1ad4ce082284c17dd22",
            measurementId: "G-8F7LRBMJB3"
        };
        
        let auth;
        let db;
        let isFirebaseConfigured = false;

        // Initialize Firebase
        (function initializeFirebase() {
            if (firebaseConfig.apiKey && firebaseConfig.apiKey.length > 5 && !firebaseConfig.apiKey.includes("YOUR_API_KEY")) {
                try {
                    const app = initializeApp(firebaseConfig);
                    auth = getAuth(app);
                    db = getFirestore(app);
                    isFirebaseConfigured = true;
                    console.log("Firebase initialized successfully.");

                } catch (e) {
                    console.error("Firebase Initialization Failed:", e);
                    showNotification("Configuration Error", "Firebase initialization failed. Check your console.");
                }
            } else {
                console.error("Firebase configuration is missing or using placeholder data. Authentication functionality will be disabled.");
                showNotification("Configuration Error", "Firebase is not properly configured. Authentication features are disabled.");
            }
        })();


        // =======================================================
        // 4. UI INTERACTIONS: PASSWORD TOGGLE, STRENGTH, DUMMY LOGIN (Unchanged)
        // =======================================================

        // Password Toggle Logic
        document.querySelectorAll('.toggle-password').forEach(toggleBtn => {
            toggleBtn.addEventListener('click', function() {
                const targetId = this.dataset.target;
                const passwordInput = document.getElementById(targetId);
                const icon = this.querySelector('i');

                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    icon.classList.remove('fa-eye');
                    icon.classList.add('fa-eye-slash');
                } else {
                    passwordInput.type = 'password';
                    icon.classList.remove('fa-eye-slash');
                    icon.classList.add('fa-eye');
                }
            });
        });

        // Dummy Social Login Handler
        document.querySelectorAll('.dummy-social-login').forEach(btn => {
            btn.addEventListener('click', () => {
                showNotification(
                    "Service Unavailable",
                    "**Google Sign-In is available soon!** Please use your email and password to log in or register for now. Thank you for your patience."
                );
            });
        });

        // Password Strength Checker
        const registerPasswordInput = document.getElementById('registerPassword');
        const strengthBar = document.getElementById('strength-bar');
        const passwordHelp = document.getElementById('password-help');

        if (registerPasswordInput) {
            registerPasswordInput.addEventListener('input', updatePasswordStrength);
        }

        function updatePasswordStrength() {
            const password = registerPasswordInput.value;
            let score = 0;
            if (password.length >= 6) { score += 20; }
            if (password.length >= 10) { score += 20; }
            if (/[A-Z]/.test(password)) { score += 20; }
            if (/[0-9]/.test(password)) { score += 20; }
            if (/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password)) { score += 20; }

            strengthBar.style.width = `${Math.min(score, 100)}%`;

            let color = 'var(--danger-red)'; 
            let status = 'Weak';

            if (score >= 80) {
                color = 'var(--success-green)'; 
                status = 'Strong';
            } else if (score >= 40) {
                color = '#ffc107'; 
                status = 'Medium';
            }

            strengthBar.style.backgroundColor = color;
            
            if (password.length > 0) {
                passwordHelp.textContent = `Strength: ${status}`;
                passwordHelp.style.color = color;
            } else {
                passwordHelp.textContent = 'Must be at least 6 characters.';
                passwordHelp.style.color = 'var(--bs-gray-600)';
            }
        }

        // Password Match Checker
        const registerConfirmPasswordInput = document.getElementById('registerConfirmPassword');
        const matchStatus = document.getElementById('match-status');

        if (registerConfirmPasswordInput && registerPasswordInput) {
            registerConfirmPasswordInput.addEventListener('input', checkPasswordMatch);
            registerPasswordInput.addEventListener('input', checkPasswordMatch);
        }

        function checkPasswordMatch() {
            const pass = registerPasswordInput.value;
            const confirmPass = registerConfirmPasswordInput.value;

            if (confirmPass.length === 0) {
                matchStatus.textContent = '';
                registerConfirmPasswordInput.classList.remove('is-valid', 'is-invalid');
                return;
            }

            if (pass === confirmPass) {
                matchStatus.textContent = 'Passwords match!';
                matchStatus.style.color = 'var(--success-green)';
                registerConfirmPasswordInput.classList.add('is-valid');
                registerConfirmPasswordInput.classList.remove('is-invalid');
            } else {
                matchStatus.textContent = 'Passwords do not match.';
                matchStatus.style.color = 'var(--danger-red)';
                registerConfirmPasswordInput.classList.add('is-invalid');
                registerConfirmPasswordInput.classList.remove('is-valid');
            }
        }


        // =======================================================
        // 5. FIREBASE AUTH LOGIC HANDLERS (Unchanged)
        // =======================================================
        
        // 5.1. Registration Handler
        document.getElementById('registerForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!isFirebaseConfigured || !auth) {
                showNotification("Error", "Firebase is not configured or initialized.");
                return;
            }

            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('registerConfirmPassword').value;

            if (password !== confirmPassword) {
                showNotification("Error", "Password and confirmation do not match.");
                return;
            }
            if (password.length < 6) {
                showNotification("Error", "Password must be at least 6 characters.");
                return;
            }

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                showNotification("Success!", `Successfully registered and logged in as ${userCredential.user.email}.`);

                setTimeout(redirectToHome, 1500);

            } catch (error) {
                let errorMessage = error.message.replace('Firebase: ', '').replace(/\(auth.*\)\.?/, '');
                showNotification("Registration Failed", `Error: ${errorMessage}`);
                console.error("Registration Error:", error);
            }
        });

        // 5.2. Login Handler
        document.getElementById('loginForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!isFirebaseConfigured || !auth) {
                showNotification("Error", "Firebase is not configured or initialized.");
                return;
            }

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const rememberMe = document.getElementById('rememberMe').checked; 

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);

                const rememberMsg = rememberMe ? " (Session noted)" : "";
                
                showNotification("Success!", `Successfully logged in as ${userCredential.user.email}.${rememberMsg}`);

                setTimeout(redirectToHome, 1500);

            } catch (error) {
                let errorMessage = error.message.replace('Firebase: ', '').replace(/\(auth.*\)\.?/, '');
                showNotification("Login Failed", `Error: ${errorMessage}`);
                console.error("Login Error:", error);
            }
        });

        // 5.3. Password Reset Handler
        const resetPasswordModalElement = document.getElementById('resetPasswordModal');
        let resetPasswordModal;
        if (resetPasswordModalElement) {
            resetPasswordModal = new bootstrap.Modal(resetPasswordModalElement);
        }

        document.getElementById('resetPasswordForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!isFirebaseConfigured || !auth) {
                showNotification("Error", "Firebase is not configured or initialized.");
                return;
            }

            const email = document.getElementById('resetEmail').value;

            try {
                await sendPasswordResetEmail(auth, email);
                if (resetPasswordModal) {
                    resetPasswordModal.hide(); 
                }
                showNotification("Password Reset Sent", `A password reset link has been successfully sent to **${email}**. Please check your inbox.`);
            } catch (error) {
                let errorMessage = error.message.replace('Firebase: ', '').replace(/\(auth.*\)\.?/, '');
                showNotification("Reset Failed", `Error: ${errorMessage}`);
                console.error("Reset Password Error:", error);
            }
        });
    </script>
</body>
</html>
