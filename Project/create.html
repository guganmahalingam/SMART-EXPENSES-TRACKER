<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Create Account - Smart Expense Tracker</title>
  <style>
    body{font-family:Arial, sans-serif;background:#f4f6f9;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
    .card{background:#fff;padding:2rem;border-radius:10px;box-shadow:0 6px 18px rgba(0,0,0,.08);width:360px}
    input{width:100%;padding:10px;margin:10px 0;border:1px solid #ccc;border-radius:6px}
    button{width:100%;padding:10px;background:#43a047;border:none;color:#fff;border-radius:6px;cursor:pointer;font-weight:600}
    a{display:block;margin-top:12px;color:#1976d2;text-decoration:none;text-align:center}
  </style>
</head>
<body>
  <div class="card">
    <h2>Create Account</h2>
    <form id="signupForm">
      <input id="email" type="email" placeholder="Email" required />
      <input id="password" type="password" placeholder="Password" required />
      <button type="submit">Sign Up</button>
    </form>
    <a href="login.html">Back to Login</a>
  </div>

  <script>
    function openDB(){
      return new Promise((res, rej) => {
        const r = indexedDB.open('UserDB', 1);
        r.onupgradeneeded = () => {
          const db = r.result;
          if (!db.objectStoreNames.contains('users')) {
            db.createObjectStore('users', { keyPath: 'email' });
          }
          if (!db.objectStoreNames.contains('budgets')) {
            db.createObjectStore('budgets', { keyPath: ['email','name'] });
          }
        };
        r.onsuccess = () => res(r.result);
        r.onerror = () => rej(r.error);
      });
    }

    document.getElementById('signupForm').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) return alert('Enter details');

      try {
        const db = await openDB();
        const tx = db.transaction('users','readwrite');
        const store = tx.objectStore('users');
        const addReq = store.add({ email, password });
        addReq.onsuccess = () => {
          alert('Account created. Please login.');
          window.location.href = 'login.html';
        };
        addReq.onerror = () => alert('User already exists.');
      } catch (err) {
        console.error(err);
        alert('DB error.');
      }
    });
  </script>
</body>
</html>
